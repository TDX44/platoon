services:
  app:
    build: .
    env_file:
      - .env
    environment:
      DATA_DIR: /data
      HTTPS: "true"
    volumes:
      - platoon_data:/data
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      - app
    restart: unless-stopped

volumes:
  platoon_data:
